server:
  port: 8080
  servlet:
    context-path: /api
spring:
  application:
    name: student
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:h2:mem:test
    username: rishabh
    password: 1234
    hikari:
      driver-class-name: org.h2.Driver
  devtools:
    restart:
      enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    config-url: /api/v3/api-docs/swagger-config
    url: /api/v3/api-docs


